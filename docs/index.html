<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta property="og:title" content="Aplico - Job Tracker">
<meta property="og:description" content="Track job applications offline. No signup, no backend.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://luiselizondotech-dotcom.github.io/job-tracker/">
<title>Aplico - Job Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#c8f135">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23c8f135'/%3E%3Crect x='7' y='20' width='5' height='6' rx='1.5' fill='%231a1a0e'/%3E%3Crect x='14' y='14' width='5' height='12' rx='1.5' fill='%231a1a0e'/%3E%3Crect x='21' y='8' width='5' height='18' rx='1.5' fill='%231a1a0e'/%3E%3C/svg%3E"/>
<style>
/* ===== TOKENS ===== */
:root {
  --lime:#c8f135; --lime-dim:rgba(200,241,53,0.12); --lime-hover:rgba(200,241,53,0.2);
  --bg:#111110; --bg2:#1a1a18; --bg3:#222220;
  --surface:#1e1e1c; --surface2:#252523; --surface3:#2e2e2c;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.13);
  --text:#f0ede8; --text2:#a09e99; --text3:#6b6966;
  --sidebar-w:220px;
  --ca:#60a5fa; --cs:#fbbf24; --ci:#c084fc; --co:#34d399; --cr:#f87171;
  --r:10px; --rl:14px;
  --font:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;
  --t:0.18s ease;
}
.light-mode {
  --bg:#f5f4f0; --bg2:#eeede9; --bg3:#e6e5e1;
  --surface:#ffffff; --surface2:#f9f8f4; --surface3:#efefea;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.14);
  --text:#1a1a18; --text2:#5a5855; --text3:#9a9895;
}

/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  height:100vh;display:flex;overflow:hidden;font-size:14px;
  line-height:1.5;-webkit-font-smoothing:antialiased;
  transition:background var(--t),color var(--t);
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;padding:14px 10px;
  gap:4px;overflow-y:auto;flex-shrink:0;
}
.sidebar-logo{
  display:flex;align-items:center;gap:9px;
  padding:4px 8px 14px;border-bottom:1px solid var(--border);margin-bottom:6px;
}
.logo-mark{
  width:28px;height:28px;background:var(--lime);border-radius:7px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.logo-mark svg{width:16px;height:16px}
.logo-name{font-size:15px;font-weight:700;letter-spacing:-.3px;color:var(--text)}
.sidebar-label{
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.8px;color:var(--text3);padding:6px 8px 2px;margin-top:4px;
}
.nav-item{
  display:flex;align-items:center;gap:9px;padding:7px 10px;
  border-radius:8px;cursor:pointer;color:var(--text2);
  font-size:13px;font-weight:500;transition:background var(--t),color var(--t);
  user-select:none;border:none;background:none;width:100%;text-align:left;
}
.nav-item:hover{background:var(--surface3);color:var(--text)}
.nav-item.active{background:var(--lime-dim);color:var(--lime)}
.nav-icon{width:15px;height:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.7}
.nav-item.active .nav-icon{opacity:1}
.nav-badge{
  margin-left:auto;background:var(--surface3);color:var(--text3);
  font-size:10.5px;font-weight:600;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center;
}
.nav-item.active .nav-badge{background:var(--lime-dim);color:var(--lime)}
.state-item{
  display:flex;align-items:center;gap:8px;padding:5px 10px;
  font-size:12px;color:var(--text2);cursor:pointer;border-radius:7px;
  transition:background var(--t);
}
.state-item:hover{background:var(--surface3);color:var(--text)}
.state-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.state-count{margin-left:auto;font-size:11px;color:var(--text3)}
.sidebar-bottom{
  margin-top:auto;padding-top:12px;border-top:1px solid var(--border);
  display:flex;flex-direction:column;gap:6px;
}

/* ===== MAIN ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* ===== TOPBAR ===== */
.topbar{
  height:50px;min-height:50px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 20px;gap:12px;background:var(--bg);
}
.topbar-bc{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--text2)}
.topbar-bc .sep{color:var(--text3)}
.topbar-bc .cur{color:var(--text);font-weight:600}
.topbar-search{flex:1;max-width:360px;margin:0 auto;position:relative}
.topbar-search input{
  width:100%;background:var(--surface);border:1px solid var(--border);
  color:var(--text);padding:6px 12px 6px 32px;border-radius:8px;
  font-size:13px;font-family:var(--font);transition:all var(--t);
}
.topbar-search input:focus{outline:none;border-color:var(--lime);box-shadow:0 0 0 3px var(--lime-dim)}
.topbar-search input::placeholder{color:var(--text3)}
.search-ic{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
.topbar-right{display:flex;align-items:center;gap:7px;margin-left:auto}
.icon-btn{
  width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  border-radius:7px;border:1px solid var(--border);background:transparent;
  color:var(--text2);cursor:pointer;transition:all var(--t);font-size:13px;font-family:var(--font);
}
.icon-btn:hover{background:var(--surface);color:var(--text)}
.btn-lime{
  display:flex;align-items:center;gap:5px;padding:6px 13px;
  background:var(--lime);color:#111110;border:none;border-radius:8px;
  font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;
  transition:all var(--t);white-space:nowrap;
}
.btn-lime:hover{background:#d4f545;transform:translateY(-1px)}
.btn-sec{
  display:flex;align-items:center;gap:5px;padding:6px 11px;
  background:var(--surface);color:var(--text2);border:1px solid var(--border);
  border-radius:8px;font-family:var(--font);font-size:13px;font-weight:500;
  cursor:pointer;transition:all var(--t);white-space:nowrap;
}
.btn-sec:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.btn-danger{background:rgba(239,68,68,.14);color:#f87171;border-color:rgba(239,68,68,.25)}
.btn-danger:hover{background:rgba(239,68,68,.25)}

/* ===== PAGE CONTENT ===== */
.page{flex:1;overflow-y:auto;padding:22px 24px}
.page-header{margin-bottom:20px}
.page-title{font-size:21px;font-weight:700;letter-spacing:-.5px;color:var(--text)}
.page-sub{font-size:12.5px;color:var(--text2);margin-top:3px}
.page-sub .hi{color:var(--lime);font-weight:600}

/* ===== STAT CARDS ===== */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:20px}
.stat-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);
  padding:15px 17px;position:relative;overflow:hidden;
  transition:border-color var(--t),transform var(--t);
}
.stat-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.stat-card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.stat-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.stat-icon{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px}
.stat-value{font-size:28px;font-weight:700;letter-spacing:-1px;color:var(--text);line-height:1;margin-bottom:6px}
.stat-trend{font-size:11px;color:var(--text3)}
.sparkline{position:absolute;bottom:0;right:0;opacity:.2;pointer-events:none}

/* ===== TOOLBAR ===== */
.toolbar{display:flex;align-items:center;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.vbtn{
  padding:5px 11px;background:transparent;border:none;color:var(--text2);
  font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;
  transition:all var(--t);display:flex;align-items:center;gap:4px;
}
.vbtn+.vbtn{border-left:1px solid var(--border)}
.vbtn:hover,.vbtn.active{background:var(--surface);color:var(--text)}
.vbtn.active{color:var(--lime)}
.chip{
  padding:4px 11px;background:var(--surface);border:1px solid var(--border);
  border-radius:20px;color:var(--text2);font-size:12px;font-weight:500;
  cursor:pointer;transition:all var(--t);white-space:nowrap;
}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.active{background:var(--lime-dim);border-color:rgba(200,241,53,.3);color:var(--lime)}
.tb-sep{flex:1}
select.tb-sel{
  padding:5px 9px;background:var(--surface);border:1px solid var(--border);
  color:var(--text2);border-radius:8px;font-family:var(--font);font-size:12px;
  cursor:pointer;transition:all var(--t);
}
select.tb-sel:focus{outline:none;border-color:var(--lime)}
select.tb-sel option{background:var(--surface)}

/* ===== TABLE ===== */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.data-table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:1000px}
.data-table thead tr{border-bottom:1px solid var(--border)}
.data-table th{
  padding:9px 13px;text-align:left;font-size:10.5px;font-weight:600;
  text-transform:uppercase;letter-spacing:.6px;color:var(--text3);
  background:var(--bg2);cursor:pointer;user-select:none;white-space:nowrap;
  transition:color var(--t);
}
.data-table th:hover{color:var(--text2)}
.data-table th.sorted{color:var(--lime)}
.data-table td{
  padding:10px 13px;border-bottom:1px solid var(--border);
  color:var(--text);vertical-align:middle;
}
.data-table tbody tr{transition:background var(--t)}
.data-table tbody tr:hover{background:var(--surface2)}
.data-table tbody tr:last-child td{border-bottom:none}
.co-cell{display:flex;align-items:center;gap:9px}
.co-av{
  width:28px;height:28px;border-radius:7px;display:flex;
  align-items:center;justify-content:center;font-size:11px;
  font-weight:700;flex-shrink:0;color:#111;
}
.co-name{font-weight:600;font-size:13px}
.co-sub{font-size:11px;color:var(--text2);margin-top:1px}
.tag-pill{
  display:inline-block;padding:2px 7px;background:var(--surface3);
  border:1px solid var(--border);border-radius:20px;font-size:10.5px;color:var(--text2);margin:1px 2px;
}
.li-btn{
  display:inline-flex;align-items:center;justify-content:center;
  width:18px;height:18px;background:#0a66c2;color:white;
  font-size:9px;font-weight:700;border-radius:3px;text-decoration:none;
  margin-left:5px;transition:opacity var(--t);vertical-align:middle;
}
.li-btn:hover{opacity:.8}
.row-actions{display:flex;gap:3px;opacity:0;transition:opacity var(--t)}
.data-table tbody tr:hover .row-actions{opacity:1}
.row-btn{
  padding:3px 7px;background:transparent;border:1px solid var(--border);
  border-radius:6px;color:var(--text2);font-size:11px;cursor:pointer;
  transition:all var(--t);font-family:var(--font);
}
.row-btn:hover{background:var(--surface3);color:var(--text)}
.row-btn.del:hover{background:rgba(239,68,68,.15);color:#f87171;border-color:rgba(239,68,68,.3)}

/* ===== STATUS BADGES ===== */
.badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap;
}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.badge-applied,.badge-aplicado{background:rgba(96,165,250,.12);color:var(--ca)}
.badge-applied::before,.badge-aplicado::before{background:var(--ca)}
.badge-screening{background:rgba(251,191,36,.12);color:var(--cs)}
.badge-screening::before{background:var(--cs)}
.badge-interview,.badge-entrevista{background:rgba(192,132,252,.12);color:var(--ci)}
.badge-interview::before,.badge-entrevista::before{background:var(--ci)}
.badge-offer,.badge-oferta{background:rgba(52,211,153,.12);color:var(--co)}
.badge-offer::before,.badge-oferta::before{background:var(--co)}
.badge-rejected,.badge-rechazado{background:rgba(248,113,113,.12);color:var(--cr)}
.badge-rejected::before,.badge-rechazado::before{background:var(--cr)}

/* ===== STARS ===== */
.star-row{display:flex;gap:4px}
.star{font-size:1.4rem;cursor:pointer;color:var(--text3);transition:color .12s,transform .1s}
.star.active{color:#fbbf24}
.star:hover{transform:scale(1.2)}

/* ===== KANBAN ===== */
.kanban-board{display:grid;grid-template-columns:repeat(5,1fr);gap:11px;min-height:400px}
.kanban-col{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);
  padding:11px;min-height:280px;transition:all var(--t);
}
.kanban-col.drag-over{border-color:var(--lime);background:var(--lime-dim)}
.kc-head{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:9px;padding:5px 7px;border-radius:7px;
}
.kc-title{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.kc-count{
  font-size:10.5px;color:var(--text3);background:var(--surface3);
  padding:1px 6px;border-radius:10px;
}
.kanban-card{
  background:var(--surface);border:1px solid var(--border);border-radius:9px;
  padding:11px;margin-bottom:7px;cursor:grab;transition:all var(--t);
}
.kanban-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,.35)}
.kanban-card.dragging{opacity:.4}
.kc-co{font-weight:600;font-size:12.5px;margin-bottom:2px}
.kc-pos{font-size:11.5px;color:var(--text2);margin-bottom:7px}
.kc-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--text3)}

/* ===== DASHBOARD ===== */
.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.chart-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--rl);padding:18px;
}
.chart-card.wide{grid-column:1/-1}
.chart-card h3{font-size:12.5px;font-weight:600;color:var(--text2);margin-bottom:14px}
canvas{max-width:100%}
.funnel{display:flex;flex-direction:column;gap:7px}
.funnel-bar{
  display:flex;justify-content:space-between;align-items:center;
  padding:11px 15px;border-radius:8px;font-size:13px;font-weight:600;color:white;
}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px}
.kpi-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:9px;padding:13px;text-align:center;
}
.kpi-val{font-size:22px;font-weight:700;color:var(--lime);letter-spacing:-.5px}
.kpi-lbl{font-size:11px;color:var(--text2);margin-top:3px}

/* ===== CALENDAR ===== */
.cal-nav{display:flex;align-items:center;gap:11px;margin-bottom:14px}
.cal-nav h3{font-size:15px;font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dn{text-align:center;font-size:10.5px;font-weight:600;color:var(--text3);padding:4px 0;text-transform:uppercase;letter-spacing:.4px}
.cal-day{
  min-height:76px;border:1px solid var(--border);border-radius:8px;
  background:var(--surface);padding:5px 6px;font-size:11px;
}
.cal-day.today{border-color:var(--lime)}
.cal-day.empty{background:transparent;border-color:transparent}
.cal-dn2{font-size:10.5px;color:var(--text2);margin-bottom:3px;font-weight:500}
.cal-ev{
  border-radius:4px;padding:2px 5px;font-size:10px;margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:pointer;color:#111;font-weight:500;
}
.cal-ev.interview{background:#fbbf24}
.cal-ev.next{background:#34d399}
.cal-ev.applied{background:#60a5fa}
.cal-legend{display:flex;align-items:center;gap:7px;margin-top:10px;font-size:11.5px;color:var(--text2)}
.cdot{width:7px;height:7px;border-radius:50%;display:inline-block}

/* ===== REMINDERS ===== */
.reminders-box{
  background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2);
  border-radius:9px;padding:11px 15px;margin-bottom:16px;
}
.reminders-box h4{color:#fbbf24;font-size:12px;font-weight:600;margin-bottom:5px}
.rem-item{font-size:12px;color:#fde68a;padding:2px 0}
.rem-item strong{color:#fbbf24}

/* ===== EMPTY ===== */
.empty-state{text-align:center;padding:55px 20px;color:var(--text3)}
.empty-icon{font-size:36px;margin-bottom:10px;display:block;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.empty-state p{font-size:13px}

/* ===== MODAL ===== */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.65);backdrop-filter:blur(6px);
  z-index:1000;justify-content:center;align-items:center;
}
.modal-overlay.active{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border2);border-radius:15px;
  padding:22px;width:92%;max-width:590px;max-height:90vh;overflow-y:auto;
  animation:mIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes mIn{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.modal-ttl{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.modal-x{
  width:26px;height:26px;border:1px solid var(--border);border-radius:7px;
  background:transparent;color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:15px;
  transition:all var(--t);
}
.modal-x:hover{background:var(--surface2);color:var(--text)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid .full{grid-column:1/-1}
.fg label{
  display:block;font-size:11px;font-weight:500;color:var(--text2);
  margin-bottom:4px;text-transform:uppercase;letter-spacing:.4px;
}
.fg input,.fg select,.fg textarea{
  width:100%;background:var(--bg2);border:1px solid var(--border);
  color:var(--text);padding:8px 11px;border-radius:8px;
  font-size:13px;font-family:var(--font);transition:all var(--t);
}
.fg input:focus,.fg select:focus,.fg textarea:focus{
  outline:none;border-color:var(--lime);box-shadow:0 0 0 3px var(--lime-dim);background:var(--bg2);
}
.fg select option{background:var(--surface)}
.fg textarea{resize:vertical;min-height:68px}
.fg input::placeholder{color:var(--text3)}
.modal-ft{
  display:flex;gap:7px;justify-content:flex-end;margin-top:18px;
  padding-top:14px;border-top:1px solid var(--border);
}
.confirm-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.65);backdrop-filter:blur(6px);
  z-index:2000;justify-content:center;align-items:center;
}
.confirm-overlay.active{display:flex}
.confirm-box{
  background:var(--surface);border:1px solid var(--border2);border-radius:13px;
  padding:22px;width:92%;max-width:360px;text-align:center;
  animation:mIn .25s cubic-bezier(.34,1.56,.64,1);
}
.confirm-box h3{font-size:14px;font-weight:700;color:var(--text);margin-bottom:7px}
.confirm-box p{font-size:12.5px;color:var(--text2);margin-bottom:18px}
.confirm-acts{display:flex;gap:7px;justify-content:center}

/* ===== AUTOCOMPLETE ===== */
.ac-wrap{position:relative}
.ac-list{
  position:absolute;top:100%;left:0;right:0;background:var(--surface);
  border:1px solid var(--border2);border-radius:8px;margin-top:4px;
  max-height:150px;overflow-y:auto;z-index:100;display:none;
  box-shadow:0 8px 22px rgba(0,0,0,.45);
